<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky — Depth Vision</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#7ecfcf}
  #title{font-size:10px;letter-spacing:6px;color:#3a7a7a;margin-bottom:16px;text-transform:uppercase}
  #container{position:relative;width:640px;height:480px;background:#000}
  #glCanvas{width:640px;height:480px;display:block}
  #startBtn{margin-top:20px;background:transparent;border:1px solid rgba(126,207,207,0.4);color:#7ecfcf;font-family:'Courier New',monospace;font-size:10px;letter-spacing:4px;padding:10px 32px;cursor:pointer;text-transform:uppercase;transition:all 0.3s}
  #startBtn:hover{border-color:rgba(126,207,207,0.8);box-shadow:0 0 12px rgba(126,207,207,0.1)}
  #status{margin-top:12px;font-size:10px;letter-spacing:3px;color:#3a7a7a;text-transform:uppercase;min-height:14px;text-align:center;max-width:400px}
  #fps{position:absolute;top:10px;right:10px;font-size:10px;letter-spacing:2px;color:#2a5a5a}
  video{display:none}
</style>
</head>
<body>
<div id="title">Rocky — Depth Vision</div>
<div id="container">
  <canvas id="glCanvas" width="640" height="480"></canvas>
  <div id="fps"></div>
</div>
<video id="webcam" autoplay playsinline muted></video>
<button id="startBtn" onclick="init()">ACTIVATE</button>
<div id="status">awaiting input</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation@1.0.1/dist/body-segmentation.min.js"></script>
<script>
const glCanvas = document.getElementById('glCanvas');
const gl = glCanvas.getContext('webgl', {antialias:false});

const vsSource = `
  attribute vec2 aPos;
  varying vec2 vUV;
  void main(){
    vUV = aPos*0.5+0.5;
    gl_Position = vec4(aPos,0.,1.);
  }
`;

const fsSource = `
  precision mediump float;
  varying vec2 vUV;
  uniform sampler2D uMask;
  uniform sampler2D uEdge;
  uniform float uTime;

  float hash(vec2 p){
    p=fract(p*vec2(127.1,311.7));
    p+=dot(p,p+19.19);
    return fract(p.x*p.y);
  }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p);
    vec2 u=f*f*(3.-2.*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
               mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
  }
  float fbm(vec2 p, int oct){
    float v=0.,a=0.5,m=0.;
    for(int i=0;i<8;i++){
      if(i>=oct)break;
      v+=noise(p)*a;m+=a;a*=0.5;p*=2.1;
    }
    return v/m;
  }
  float domainWarp(vec2 uv, float t){
    float w=1.9;
    float s1=sin(t*.7),c1=cos(t*.5),s2=sin(t*.4),c2=cos(t*.9);
    float s3=sin(t*1.1),c3=cos(t*.3),s4=sin(t*.6),c4=cos(t*.8);
    vec2 q=vec2(fbm(uv+vec2(s1*1.2,c2*1.1),4),
                fbm(uv+vec2(c3+5.2,s4*1.3+1.3),4));
    vec2 r=vec2(fbm(uv+q*w+vec2(s2*1.1+1.7,c1*1.2+9.2),4),
                fbm(uv+q*w+vec2(c4*.9+8.3,s3+2.8),4));
    return fbm(uv+r*w+vec2(s1*.3,c3*.3),4);
  }

  void main(){
    vec2 uv = vUV;

    // Sample mask at expanded radius for smoke zone
    float m0 = texture2D(uMask, uv).r;

    // Smoke: sample mask pulled inward by a noisy offset
    // If that inward point is inside body but current point is outside — smoke zone
    float smokeRadius = 0.08;
    float smokeNoise2 = fbm(uv*7.0+vec2(uTime*.2,uTime*.13),3);
    float noisyRadius = smokeRadius*(0.4+smokeNoise2*0.6);
    vec2 inward = uv + normalize(uv-vec2(0.5))*(-noisyRadius);
    inward = clamp(inward,0.,1.);
    float mInward = texture2D(uMask, inward).r;

    float outsideBody = 1.0-smoothstep(0.3,0.6,m0);
    float nearBody    = smoothstep(0.3,0.6,mInward);
    float smokeVal    = outsideBody * nearBody;

    // Smoke driven by domain warp noise, patchy not uniform
    float smokeTex = domainWarp(uv*5.0, uTime*0.7);
    smokeTex = clamp(smokeTex*0.5+0.5-0.25,0.,1.)/0.75;
    smokeTex = pow(smokeTex,1.5);
    float smoke = smokeVal * smokeTex * 0.5;

    // Body mask — noisy edge for organic boundary
    float edgeNoise = fbm(uv*10.0+vec2(sin(uTime*.25),cos(uTime*.18)),3)*0.04;
    float warpedMask = texture2D(uMask, uv+vec2(edgeNoise)).r;
    float sharpMask  = smoothstep(0.25, 0.65, warpedMask);

    // Radial falloff — bright core dissolves to edges
    float radial = smoothstep(0.0,0.85,m0);

    // Body texture
    vec2 warpUV = uv*8.0;
    float tex = domainWarp(warpUV, uTime);
    float raw = clamp(tex*0.5+0.5-0.33,0.,1.)/0.67;
    tex = pow(raw,3.0);
    tex *= (0.35+radial*0.65);

    // White edge detail — interior only
    float edge = texture2D(uEdge, uv).r;
    float interior = smoothstep(0.4,0.8,m0);
    float edgeDetail = edge*interior*0.28;

    float combined = clamp(sharpMask*tex + edgeDetail + smoke, 0.,1.);

    float lum = combined;
    float tint = 0.51;
    vec3 col = vec3(
      lum*(1.-tint*0.35),
      lum*(1.-tint*0.15),
      min(1.,lum*(1.+tint*0.22))
    );
    gl_FragColor = vec4(col,1.);
  }
`;

function compileShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,compileShader(gl.VERTEX_SHADER,vsSource));
gl.attachShader(prog,compileShader(gl.FRAGMENT_SHADER,fsSource));
gl.linkProgram(prog);gl.useProgram(prog);

const quad=new Float32Array([-1,-1,1,-1,-1,1,1,1]);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,quad,gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const uMaskLoc=gl.getUniformLocation(prog,'uMask');
const uEdgeLoc=gl.getUniformLocation(prog,'uEdge');
const uTimeLoc=gl.getUniformLocation(prog,'uTime');

function makeTex(unit){
  const t=gl.createTexture();
  gl.activeTexture(gl.TEXTURE0+unit);
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  return t;
}
const maskTex=makeTex(0);
const edgeTex=makeTex(1);
gl.uniform1i(uMaskLoc,0);
gl.uniform1i(uEdgeLoc,1);

const statusEl=document.getElementById('status');
const fpsEl=document.getElementById('fps');
const webcam=document.getElementById('webcam');
let segmenter=null,running=false;
let frameCount=0,lastTime=performance.now();

const SEG_W=256,SEG_H=192;
const segCanvas=document.createElement('canvas');
segCanvas.width=SEG_W;segCanvas.height=SEG_H;
const segCtx=segCanvas.getContext('2d',{willReadFrequently:true});

const EDGE_W=320,EDGE_H=240;
const edgeCanvas=document.createElement('canvas');
edgeCanvas.width=EDGE_W;edgeCanvas.height=EDGE_H;
const edgeCtx=edgeCanvas.getContext('2d',{willReadFrequently:true});

const maskData=new Uint8Array(SEG_W*SEG_H*4);
const edgeImgData=new Uint8Array(EDGE_W*EDGE_H*4);
let edgeFrame=0;

function uploadMask(segData){
  for(let i=0;i<SEG_W*SEG_H;i++){
    const v=segData[i]?255:0;
    maskData[i*4]=v;maskData[i*4+1]=v;maskData[i*4+2]=v;maskData[i*4+3]=255;
  }
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,maskTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,SEG_W,SEG_H,0,gl.RGBA,gl.UNSIGNED_BYTE,maskData);
}

function uploadEdge(){
  edgeFrame++;
  if(edgeFrame%2!==0)return;
  edgeCtx.save();
  edgeCtx.translate(EDGE_W,0);edgeCtx.scale(-1,1);
  edgeCtx.drawImage(webcam,0,0,EDGE_W,EDGE_H);
  edgeCtx.restore();
  const raw=edgeCtx.getImageData(0,0,EDGE_W,EDGE_H);
  const d=raw.data;
  for(let y=1;y<EDGE_H-1;y++){
    for(let x=1;x<EDGE_W-1;x++){
      const i=(y*EDGE_W+x)*4;
      const gx=d[(y*EDGE_W+x+1)*4]-d[(y*EDGE_W+x-1)*4];
      const gy=d[((y+1)*EDGE_W+x)*4]-d[((y-1)*EDGE_W+x)*4];
      const e=Math.min(255,Math.sqrt(gx*gx+gy*gy)*1.5);
      edgeImgData[i]=e;edgeImgData[i+1]=e;edgeImgData[i+2]=e;edgeImgData[i+3]=255;
    }
  }
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,edgeTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,EDGE_W,EDGE_H,0,gl.RGBA,gl.UNSIGNED_BYTE,edgeImgData);
}

function renderLoop(ts){
  gl.uniform1f(uTimeLoc,ts/1000*0.22);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(renderLoop);
}

let processing=false;
async function segLoop(){
  if(!running)return;
  if(!processing&&webcam.readyState>=2){
    processing=true;
    segCtx.save();
    segCtx.translate(SEG_W,0);segCtx.scale(-1,1);
    segCtx.drawImage(webcam,0,0,SEG_W,SEG_H);
    segCtx.restore();
    try{
      const seg=await segmenter.segmentPeople(segCanvas);
      if(seg&&seg.length>0){
        const fg=await bodySegmentation.toBinaryMask(
          seg,{r:255,g:255,b:255,a:255},{r:0,g:0,b:0,a:255},false,0.5
        );
        const segData=new Uint8Array(SEG_W*SEG_H);
        for(let i=0;i<SEG_W*SEG_H;i++)segData[i]=fg.data[i*4]>128?1:0;
        uploadMask(segData);
        uploadEdge();
        frameCount++;
        const now=performance.now();
        if(now-lastTime>=1000){fpsEl.textContent=frameCount+' fps';frameCount=0;lastTime=now;}
      }
    }catch(e){console.error(e);}
    processing=false;
  }
  setTimeout(segLoop,0);
}

async function init(){
  document.getElementById('startBtn').style.display='none';
  statusEl.textContent='loading model...';
  try{
    segmenter=await bodySegmentation.createSegmenter(
      bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation,
      {runtime:'tfjs',modelType:'general'}
    );
    statusEl.textContent='model ready — requesting camera...';
  }catch(e){
    statusEl.textContent='failed: '+e.message.slice(0,60);
    document.getElementById('startBtn').style.display='block';
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    webcam.srcObject=stream;
    await webcam.play();
    running=true;
    statusEl.textContent='vision active';
    requestAnimationFrame(renderLoop);
    segLoop();
  }catch(e){
    statusEl.textContent='camera denied';
    document.getElementById('startBtn').style.display='block';
  }
}
</script>
</body>
</html>
